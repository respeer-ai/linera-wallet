  - name: UI Visual Polish
    tasks:
      - id: UI-001
        status: Done
        priority: P1
        depends_on: []
        title: 调整全局配色系统但不改 UX
        notes: 第一阶段。仅调整全局配色系统，不改交互、不改页面流程、不改信息架构、不重做 UX。范围包括定义和统一 background/surface/text-primary/text-secondary/border/primary/success/warning/danger 等语义色，收敛按钮、卡片、输入框、标签、状态色，修正文字与背景的对比关系，优先落在全局样式变量和通用样式入口
      - id: UI-002
        status: Doing
        priority: P1
        depends_on: [UI-001]
        title: 调整各页面页内视觉排版但不改 UX
        notes: 第二阶段。仅调整每一页页内组件大小、区块间距、内外边距、字号层级、文案信息权重和对应字体颜色，不改页面流程、不改交互结构、不改信息架构、不重新实现 UX。当前按 Material 风格页内整治收口，重点整合 UI-003 到 UI-007 的 5 个问题：header 去卡片化、popup/page 顶层去多余圆角、多层 surface 合并、列表项按标准 list row 收敛、输入区按更明确的 field 语义收敛
      - id: UI-003
        status: Done
        priority: P0
        depends_on: [UI-002]
        title: 去掉 popup 根容器和 page header 的多余圆角卡片化
        notes: 对应评审项 1 和 2。header 改成真正贴边的 top bar 语义，去掉 `page-header` 的卡片式圆角和外框悬浮感；popup 根容器去掉与浏览器扩展方形外框冲突的大圆角，避免顶部和四角出现多余留白
      - id: UI-004
        status: Done
        priority: P0
        depends_on: [UI-002]
        title: 合并页内多层 surface 与重复边框
        notes: 对应评审项 3。减少 `page-container`、`page-header`、`panel-card`、内部卡片之间的重复 surface 嵌套，控制一页内主容器层数，避免连续多层 outlined surface 造成页面碎裂
      - id: UI-005
        status: Done
        priority: P1
        depends_on: [UI-002]
        title: 按 Material list row 收敛账户与选择器列表
        notes: 对应评审项 5。统一 avatar、primary text、supporting text、数值、secondary action 的排列和密度，减少同一行里多重强调，选中态只保留一种主要反馈
      - id: UI-006
        status: Done
        priority: P1
        depends_on: [UI-002]
        title: 按更明确的 field 语义收敛输入区
        notes: 对应评审项 4。减少仅靠 placeholder 传达字段含义的写法，统一输入框、下拉触发器、append action、说明文字的层级和边距，使其更接近 Material text field 的信息表达方式
      - id: UI-007
        status: Done
        priority: P1
        depends_on: [UI-002]
        title: 将页头收成 Material 风格三段式 top bar
        notes: 对应评审项 1 和 9。把页头结构收成 leading / center / trailing 三段，避免当前账户两行信息与左右操作区互相抢层级；次信息不再和主标题同层竞争
